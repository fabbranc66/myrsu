name: Deploy hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, gd, mbstring, zip

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Build hosting env
        env:
          DB_CHARSET: ${{ secrets.DB_CHARSET }}
          HOSTING_DOCUMENTS_ENDPOINT: ${{ secrets.HOSTING_DOCUMENTS_ENDPOINT }}
          HOSTING_DOCUMENTS_TOKEN: ${{ secrets.HOSTING_DOCUMENTS_TOKEN }}
          MYRSU_SIGNING_SECRET: ${{ secrets.MYRSU_SIGNING_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          cat > .deploy.env <<EOF
          DB_HOST=31.11.39.231
          DB_DATABASE=Sql1874742_5
          DB_USERNAME=Sql1874742
          DB_PASSWORD=@GenniH264rgnm
          DB_CHARSET=${DB_CHARSET:-utf8mb4}
          HOSTING_DOCUMENTS_ENDPOINT=${HOSTING_DOCUMENTS_ENDPOINT}
          HOSTING_DOCUMENTS_TOKEN=${HOSTING_DOCUMENTS_TOKEN}
          MYRSU_SIGNING_SECRET=${MYRSU_SIGNING_SECRET}
          APP_URL=${APP_URL:-https://www.kr-solutions.it/myrsu}
          EOF

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          FTP_HOST="${FTP_SERVER#ftp://}"
          FTP_HOST="${FTP_HOST%/}"
          FTP_TARGET_DIR="www.kr-solutions.it/myrsu"

          echo "FTP host: $FTP_HOST"
          echo "FTP target: /$FTP_TARGET_DIR/"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 20
          mirror -R . /$FTP_TARGET_DIR \
            --verbose \
            --delete \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob .agents/ \
            --exclude-glob vendor/ \
            --exclude-glob database/ \
            --exclude-glob scripts/ \
            --exclude-glob storage/private/ \
            --exclude-glob public/documents/ \
            --exclude-glob ui/templates/ \
            --exclude-glob .env \
            --exclude-glob .env.example \
            --exclude-glob .deploy.env \
            --exclude-glob .gitignore \
            --exclude-glob README.md \
            --exclude-glob DEVELOPMENT_RULES.md \
            --exclude-glob composer.json \
            --exclude-glob composer.lock \
            --exclude-glob .htaccess \
            --exclude-glob storage/.htaccess
          put -O /$FTP_TARGET_DIR .deploy.env -o .env
          bye
          EOF
