name: Deploy hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, gd, mbstring, zip

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Build hosting env
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CHARSET: ${{ secrets.DB_CHARSET }}
          HOSTING_DOCUMENTS_ENDPOINT: ${{ secrets.HOSTING_DOCUMENTS_ENDPOINT }}
          HOSTING_DOCUMENTS_TOKEN: ${{ secrets.HOSTING_DOCUMENTS_TOKEN }}
          MYRSU_SIGNING_SECRET: ${{ secrets.MYRSU_SIGNING_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          cat > .deploy.env <<EOF
          DB_HOST=${DB_HOST}
          DB_DATABASE=Sql1874742_5
          DB_USERNAME=${DB_USERNAME}
          DB_PASSWORD=${DB_PASSWORD}
          DB_CHARSET=${DB_CHARSET:-utf8mb4}
          HOSTING_DOCUMENTS_ENDPOINT=${HOSTING_DOCUMENTS_ENDPOINT}
          HOSTING_DOCUMENTS_TOKEN=${HOSTING_DOCUMENTS_TOKEN}
          MYRSU_SIGNING_SECRET=${MYRSU_SIGNING_SECRET}
          APP_URL=${APP_URL:-https://www.kr-solutions.it/myrsu}
          EOF

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          FTP_HOST="${FTP_SERVER#ftp://}"
          FTP_HOST="${FTP_HOST%/}"
          FTP_TARGET_DIR="www.kr-solutions.it/myrsu"

          echo "FTP host: $FTP_HOST"
          echo "FTP target: /$FTP_TARGET_DIR/"

          echo "Uploading .env"
          curl --fail --silent --show-error --ftp-create-dirs --ftp-method nocwd \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            --upload-file ".deploy.env" \
            "ftp://$FTP_HOST/$FTP_TARGET_DIR/.env"

          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -path './.env' \
            ! -path './.deploy.env' \
            ! -path './.gitignore' \
            ! -path './.htaccess' \
            ! -path './storage/.htaccess' \
            ! -path './README.md' \
            ! -path './DEVELOPMENT_RULES.md' \
            ! -path './scripts/*' \
            ! -path './composer.json' \
            ! -path './composer.lock' \
            ! -path './vendor/*' \
            ! -path './public/documents/*' \
            ! -path './storage/private/*' \
            -print0 | while IFS= read -r -d '' file; do
              remote="${file#./}"
              echo "Uploading $remote"
              curl --fail --silent --show-error --ftp-create-dirs --ftp-method nocwd \
                --user "$FTP_USERNAME:$FTP_PASSWORD" \
                --upload-file "$file" \
                "ftp://$FTP_HOST/$FTP_TARGET_DIR/$remote"
            done
