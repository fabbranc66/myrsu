name: Deploy hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, gd, mbstring, zip

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          FTP_HOST="${FTP_SERVER#ftp://}"
          FTP_HOST="${FTP_HOST%/}"
          FTP_TARGET_DIR="myrsu"

          echo "FTP host: $FTP_HOST"
          echo "FTP target: /$FTP_TARGET_DIR/"
          curl --fail --show-error --ftp-create-dirs --ftp-method nocwd \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://$FTP_HOST/$FTP_TARGET_DIR/"

          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -path './.env' \
            ! -path './.gitignore' \
            ! -path './public/documents/*' \
            ! -path './storage/private/*' \
            -print0 | while IFS= read -r -d '' file; do
              remote="${file#./}"
              echo "Uploading $remote"
              curl --fail --silent --show-error --ftp-create-dirs \
                --user "$FTP_USERNAME:$FTP_PASSWORD" \
                --upload-file "$file" \
                "ftp://$FTP_HOST/$FTP_TARGET_DIR/$remote"
            done
