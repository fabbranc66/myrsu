<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyRSU Scheda pratica</title>
  <link rel="stylesheet" href="menu.css?v=20260719-mobile-menu-10"><link rel="stylesheet" href="users.css?v=20260627-1"><link rel="stylesheet" href="practices.css?v=20260628-2">
</head>
<body>
  <header class="app-header"><div><p class="eyebrow">MyRSU</p><h1>Scheda pratica</h1></div><nav class="app-nav"></nav></header>
  <main><section class="panel">
    <header><div><h1 id="practiceHeading">Pratica</h1><p id="practiceSummary" class="muted"></p></div><a class="button" href="practices.html">Torna alle pratiche</a></header>
    <div id="practiceMeta" class="practice-meta"></div>
    <div class="practice-view-grid">
      <section class="practice-card">
        <h2>Dati pratica</h2>
        <form id="practiceEditForm" class="practice-form">
          <label class="wide">Titolo<input name="title" maxlength="255" required></label>
          <label class="wide">Sintesi<textarea name="summary" rows="5"></textarea></label>
          <label>Tipo<select name="type"></select></label><label>Stato<select name="status"></select></label>
          <label>Priorità<select name="priority"></select></label><label>Origine<select name="source_type"></select></label>
          <label>Assegnata a<select name="assigned_user_id"></select></label><label>Visibilità<select name="visibility"></select></label>
          <label>Scadenza<input name="due_date" type="date"></label><div class="wide"><button type="submit">Salva pratica</button></div>
        </form>
        <h2>Nota operativa</h2>
        <form id="practiceNoteForm"><label>Testo<textarea name="body" rows="4" required></textarea></label><button type="submit">Aggiungi nota</button></form>
      </section>
      <section class="practice-card"><h2>Timeline cronologica</h2><div id="practiceTimeline" class="practice-timeline"></div></section>
    </div>
    <pre id="message"></pre><pre id="jsonOutput" class="json-output"></pre>
  </section></main>
  <script src="practice-options.js?v=20260628-1"></script><script src="practice-view.js?v=20260628-1"></script><script src="auth-menu.js?v=20260720-permits-1"></script>
</body>
</html>
