<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyRSU Segnalazioni</title>
  <link rel="stylesheet" href="menu.css?v=20260719-mobile-menu-10">
  <link rel="stylesheet" href="users.css?v=20260719-public-pages-2">
</head>
<body>
  <header class="app-header">
    <div><p class="eyebrow">MyRSU</p><h1>Segnalazioni</h1></div>
    <nav class="app-nav">
      <a href="app/index.html">Dashboard</a>
      <div class="menu-group"><span>Anagrafica</span><div class="submenu"><a href="users.html">Utenti</a><a href="profile.html">Profilo</a><a href="contacts.html">Contatti</a></div></div>
      <div class="menu-group"><span>Protocollo</span><div class="submenu"><a href="protocol.html">Registro</a></div></div>
      <div class="menu-group active"><span>Archivio</span><div class="submenu"><a href="documents.html">Documenti</a><a href="comunicati-create.html">Comunicati</a><a href="union-meetings.html">Incontri sindacali</a><a href="calls.html">Telefonate</a><a class="active" href="reports.html">Segnalazioni</a><a href="reports-moderation.html">Moderazione</a><a href="pending-queue.html">Coda PDF</a></div></div>
    </nav>
  </header>

  <main>
    <section class="panel public-form-panel">
      <header>
        <div>
          <h1>Nuova segnalazione</h1>
          <p class="muted">Invio riservato con archiviazione PDF in Segnalazioni.</p>
        </div>
      </header>

      <form id="reportForm" class="grid">
        <label class="wide">Oggetto<textarea name="subject" rows="3" maxlength="255" required></textarea></label>
        <label>Contatto opzionale<input name="contact" maxlength="255"></label>
        <label class="wide">Messaggio<textarea name="message" rows="8" required></textarea></label>
        <label class="wide">Foto/video dalla galleria
          <input name="attachments[]" type="file" accept="image/*,video/*" multiple>
        </label>
        <div class="wide mobile-media-fields">
          <label>Foto da fotocamera
            <input name="attachments[]" type="file" accept="image/*" capture="environment">
          </label>
          <label>Video da fotocamera
            <input name="attachments[]" type="file" accept="video/*" capture="environment">
          </label>
        </div>
        <input class="bot-field" name="website" autocomplete="off" tabindex="-1">
        <input id="antibotA" name="antibot_a" type="hidden">
        <input id="antibotB" name="antibot_b" type="hidden">
        <input id="antibotErrors" name="antibot_errors" type="hidden" value="0">
        <label id="antibotLabel">Controllo antibot<input name="antibot_answer" inputmode="numeric" required></label>
        <button type="submit">Invia segnalazione</button>
      </form>

      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="icons.js?v=20260719-icons-1"></script>
  <script src="reports.js"></script>
  <script src="auth-menu.js?v=20260719-mobile-menu-2"></script>
</body>
</html>
