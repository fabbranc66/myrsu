<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyRSU Protocol Test</title>
  <link rel="stylesheet" href="menu.css">
  <link rel="stylesheet" href="users.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">MyRSU</p>
      <h1>Protocollo</h1>
    </div>
    <nav class="app-nav">
      <a href="app/index.html">Dashboard</a>
      <div class="menu-group">
        <span>Anagrafica</span>
        <div class="submenu">
          <a href="users.html">Utenti</a>
          <a href="profile.html">Profilo</a>
        </div>
      </div>
      <div class="menu-group active">
        <span>Protocollo</span>
        <div class="submenu">
          <a class="active" href="protocol.html">Registro</a>
        </div>
      </div>
      <div class="menu-group">
        <span>Archivio</span>
        <div class="submenu">
          <a href="documents.html">Documenti</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="panel">
      <header class="register-head">
        <div>
          <h1>Registro protocollo</h1>
          <p class="muted">Entrata e uscita documenti protocollati.</p>
        </div>
        <span id="protocolCount" class="register-count">0</span>
      </header>

      <div class="grid">
        <label>Filtro elenco<select id="directionFilter">
          <option value="">Tutti</option>
          <option value="IN">IN</option>
          <option value="OUT">OUT</option>
        </select></label>
      </div>

      <div id="protocolTable" class="register-list"></div>

      <dialog id="documentModal">
        <header>
          <h2>Documento</h2>
          <button id="closeDocumentModal" type="button">Chiudi</button>
        </header>
        <iframe id="documentPreview" title="Document preview"></iframe>
      </dialog>

      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="icons.js"></script>
  <script src="protocol.js"></script>
</body>
</html>
