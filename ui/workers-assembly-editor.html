<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor assemblea - MyRSU</title>
  <link rel="stylesheet" href="menu.css?v=20260627-1">
  <link rel="stylesheet" href="users.css?v=20260718-3">
</head>
<body>
  <header class="app-header">
    <div><p class="eyebrow">MyRSU</p><h1>Editor assemblea</h1></div>
    <nav class="app-nav"></nav>
  </header>
  <main>
    <section class="panel">
      <header class="topbar">
        <div><p class="eyebrow">Assemblee lavoratori</p><h1 id="pageTitle">Nuova assemblea</h1></div>
        <a class="secondary-link" href="workers-assemblies.html">Lista assemblee</a>
      </header>
      <form id="assemblyForm" class="grid">
        <label class="full-width">Titolo<input name="title" required></label>
        <label>Stato<select name="status"><option value="draft">bozza</option><option value="called">convocata</option><option value="done">svolta</option><option value="cancelled">annullata</option></select></label>
        <label>Visibilita<select name="visibility"><option value="members">membri</option><option value="public">pubblico</option><option value="rsu">rsu</option></select></label>
        <label>Pratica<select id="practiceSelect" name="practice_id"><option value="">non associata</option></select></label>
        <label>Votazione<select name="voting_enabled"><option value="">no</option><option value="1">sì</option></select></label>
        <section id="votingPanel" class="full-width panel hidden">
          <label>Tipo votazione<select name="voting_mode"><option value="online">online</option><option value="manual">manuale</option></select></label>
          <label class="full-width">Oggetto votazione<input name="voting_subject"></label>
          <div class="grid">
            <label>Opzione 1<input name="voting_option_1" value="Favorevole"></label>
            <label>Opzione 2<input name="voting_option_2" value="Contrario"></label>
            <label>Opzione 3<input name="voting_option_3" value="Astenuto"></label>
            <label>Opzione 4<input name="voting_option_4"></label>
          </div>
        </section>
        <div class="full-width contact-picker">
          <label>Partecipanti<input id="participantSearch" type="text" autocomplete="off" placeholder="Cerca o scrivi nuovo contatto"></label>
          <div id="participantTags" class="tag-list"></div>
          <div id="participantResults" class="contact-results hidden"></div>
        </div>
        <label class="full-width">Ordine del giorno<textarea name="agenda" required></textarea></label>
        <label class="full-width">Descrizione<textarea name="description"></textarea></label>
        <label class="full-width">Chiosa finale<textarea name="final_statement"></textarea></label>
        <section class="full-width">
          <header class="topbar"><h2>Turni assemblea</h2><button id="addSession" type="button">Aggiungi turno</button></header>
          <div id="sessions"></div>
        </section>
        <button id="saveButton" type="submit">Salva assemblea</button>
      </form>
      <section id="attachmentsPanel" class="content hidden">
        <header class="topbar"><div><p class="eyebrow">Allegati</p><h2>Documenti assemblea</h2></div></header>
        <form id="attachmentForm" class="grid">
          <input name="file" type="file" required>
          <button type="submit">Carica allegato</button>
        </form>
        <form id="existingDocumentForm" class="grid">
          <label class="full-width">Documento da archivio<select id="existingDocumentSelect" name="document_id" required></select></label>
          <button type="submit">Collega documento</button>
        </form>
        <table>
          <thead><tr><th>Documento</th><th>Stato</th><th>Azioni</th></tr></thead>
          <tbody id="attachmentsTable"></tbody>
        </table>
      </section>
      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
      <dialog id="documentModal" class="preview-modal">
        <header><h2>Allegato</h2><button id="closeDocumentModal" type="button">Chiudi</button></header>
        <iframe id="documentPreview" title="Anteprima allegato"></iframe>
      </dialog>

      <dialog id="contactModal">
        <header><h2>Nuovo contatto</h2><button id="closeContactModal" type="button">Chiudi</button></header>
        <form id="contactForm" class="grid">
          <label>Origine<select name="source"><option value="institutional">istituzionale</option><option value="user">interno</option></select></label>
          <label>Tipo<select name="type"><option value="aziendale">aziendale</option><option value="sindacale">sindacale</option><option value="esterno">esterno</option></select></label>
          <label>Nome<input name="name" required></label>
          <label>Ruolo<input name="role"></label>
          <label>Organizzazione<input name="organization"></label>
          <label>Email<input name="email" type="email"></label>
          <label>Telefono<input name="phone"></label>
          <label>Ruolo interno<select name="user_role"><option value="membro">membro</option><option value="delegato">delegato</option><option value="rls">rls</option><option value="admin">admin</option></select></label>
          <label>Password interno<input name="password" type="password"></label>
          <label class="full-width">Note<textarea name="notes"></textarea></label>
          <button type="submit">Salva contatto</button>
        </form>
      </dialog>
    </section>
  </main>
  <script src="icons.js?v=20260627-1"></script>
  <script src="workers-assembly-editor.js?v=20260719-2"></script>
  <script src="auth-menu.js?v=20260719-1"></script>
</body>
</html>
