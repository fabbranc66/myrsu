<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyRSU Protocol Edit</title>
  <link rel="stylesheet" href="menu.css">
  <link rel="stylesheet" href="users.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">MyRSU</p>
      <h1>Modifica protocollo</h1>
    </div>
    <nav class="app-nav">
      <a href="app/index.html">Dashboard</a>
      <div class="menu-group">
        <span>Anagrafica</span>
        <div class="submenu">
          <a href="users.html">Utenti</a>
          <a href="profile.html">Profilo</a>
        </div>
      </div>
      <div class="menu-group active">
        <span>Protocollo</span>
        <div class="submenu">
          <a class="active" href="protocol.html">Registro</a>
        </div>
      </div>
      <div class="menu-group">
        <span>Archivio</span>
        <div class="submenu">
          <a href="documents.html">Documenti</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="panel">
      <header>
        <h1>Protocol Edit</h1>
      </header>
      <form id="editForm" class="grid">
        <label>Number<input name="protocol_number" readonly></label>
        <label>Subject<input name="subject" required></label>
        <label>Document ID<input name="document_id" type="number"></label>
        <button type="submit">Save</button>
      </form>
      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="protocol-edit.js"></script>
</body>
</html>
