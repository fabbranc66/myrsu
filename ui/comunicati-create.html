<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comunicati - MyRSU</title>
  <link rel="stylesheet" href="menu.css?v=20260627-1">
  <link rel="stylesheet" href="users.css?v=20260718-1">
</head>
<body>
  <header class="app-header">
    <div><p class="eyebrow">MyRSU</p><h1>Comunicati</h1></div>
    <nav class="app-nav"></nav>
  </header>
  <main>
    <section class="panel">
      <header class="topbar">
        <div>
          <p class="eyebrow">Archivio</p>
          <h1>Lista comunicati</h1>
        </div>
        <a class="secondary-link" href="comunicati-editor.html">Nuovo comunicato</a>
      </header>
      <table>
        <thead>
          <tr><th>Documento</th><th>Visibilità</th><th>Stato</th><th>Data</th><th>Azioni</th></tr>
        </thead>
        <tbody id="comunicatiTable"></tbody>
      </table>
      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>

      <dialog id="documentModal" class="preview-modal">
        <header>
          <h2>Anteprima comunicato</h2>
          <button id="closeDocumentModal" type="button">Chiudi</button>
        </header>
        <iframe id="documentPreview" title="Anteprima comunicato"></iframe>
      </dialog>

      <dialog id="verifyFrameModal" class="preview-modal">
        <header>
          <h2>Verifica autenticità</h2>
          <button id="closeVerifyFrameModal" type="button">Chiudi</button>
        </header>
        <iframe id="verifyFrame" title="Verifica autenticità"></iframe>
      </dialog>
    </section>
  </main>
  <script src="icons.js?v=20260627-1"></script>
  <script src="comunicati-create.js?v=20260718-4"></script>
  <script src="auth-menu.js?v=20260628-3"></script>
</body>
</html>
