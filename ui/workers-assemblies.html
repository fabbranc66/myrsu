<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assemblee lavoratori - MyRSU</title>
  <link rel="stylesheet" href="menu.css?v=20260719-mobile-menu-10">
  <link rel="stylesheet" href="app/css/layout.css?v=20260718-2">
  <link rel="stylesheet" href="users.css?v=20260719-mobile-11">

<body>
  <header class="app-header">
    <div><p class="eyebrow">MyRSU</p><h1>Assemblee lavoratori</h1></div>
    <nav class="app-nav"></nav>
  </header>
  <main>
    <section class="panel">
      <header class="topbar">
        <div><p class="eyebrow">Archivio</p><h1>Lista assemblee</h1></div>
        <a class="secondary-link" href="workers-assembly-editor.html">Nuova assemblea</a>
      </header>
      <table>
        <thead><tr><th>Titolo</th><th>Turni</th><th>Stato</th><th>Visibilita</th><th>Documenti</th><th>Voto</th><th>Azioni</th></tr></thead>
        <tbody id="assembliesTable"></tbody>
      </table>
      <div id="convocationModal" class="document-modal hidden">
        <div class="document-modal-content file-modal">
          <header>
            <h2>Convocazione</h2>
            <button id="closeConvocationModal" type="button">x</button>
          </header>
          <iframe id="convocationPreview" title="Anteprima convocazione"></iframe>
        </div>
      </div>
      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="icons.js?v=20260719-icons-1"></script>
