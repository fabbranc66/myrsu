<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modifica documento - MyRSU</title>
  <link rel="stylesheet" href="menu.css?v=20260719-mobile-menu-10">
  <link rel="stylesheet" href="users.css?v=20260627-2">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">MyRSU</p>
      <h1>Modifica documento</h1>
    </div>
    <nav class="app-nav"></nav>
  </header>

  <main>
    <section class="panel">
      <header class="topbar">
        <div>
          <p class="eyebrow">Archivio</p>
          <h1>Modifica documento</h1>
        </div>
        <div class="inline-actions">
          <a class="secondary-link" href="documents.html">Archivio documenti</a>
          <a class="secondary-link" href="protocol.html">Registro protocollo</a>
          <button id="previewButton" class="secondary-link hidden" type="button">Anteprima PDF</button>
        </div>
      </header>
      <form id="editForm" class="grid">
        <input name="original_name" readonly>
        <input name="category" readonly>
        <select name="visibility">
          <option value="rsu">rsu</option>
          <option value="members">members</option>
          <option value="public">public</option>
        </select>
        <textarea name="title" id="titleField" class="hidden" placeholder="Oggetto" style="min-height:120px;grid-column:1/-1;padding:12px;border:1px solid #cbd5e1;border-radius:6px;font:inherit;resize:vertical;"></textarea>
        <textarea name="body" id="bodyField" class="hidden" placeholder="Contenuto" style="min-height:320px;grid-column:1/-1;padding:12px;border:1px solid #cbd5e1;border-radius:6px;font:inherit;resize:vertical;"></textarea>
        <button id="saveButton" type="submit">Salva</button>
      </form>
      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="auth-menu.js?v=20260720-permits-1"></script>
  <script src="document-edit.js?v=20260718-1"></script>
</body>
</html>
