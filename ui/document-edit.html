<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyRSU Document Edit</title>
  <link rel="stylesheet" href="menu.css?v=20260627-1">
  <link rel="stylesheet" href="users.css?v=20260627-2">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">MyRSU</p>
      <h1>Modifica documento</h1>
    </div>
    <nav class="app-nav">
      <a href="app/index.html">Dashboard</a>
      <div class="menu-group">
        <span>Anagrafica</span>
        <div class="submenu">
          <a href="users.html">Utenti</a>
          <a href="profile.html">Profilo</a><a href="contacts.html">Contatti</a>
        </div>
      </div>
      <div class="menu-group">
        <span>Protocollo</span>
        <div class="submenu">
          <a href="protocol.html">Registro</a>
        </div>
      </div>
      <div class="menu-group active">
        <span>Archivio</span>
        <div class="submenu">
          <a class="active" href="documents.html">Documenti</a>
          <a href="comunicati-create.html">Comunicati</a><a href="union-meetings.html">Incontri sindacali</a><a href="calls.html">Telefonate</a>
          <a href="reports.html">Segnalazioni</a>
          <a href="reports-moderation.html">Moderazione</a>
          <a href="pending-queue.html">Coda PDF</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="panel">
      <header>
        <h1>Document Edit</h1>
      </header>
      <form id="editForm" class="grid">
        <input name="original_name" readonly>
        <input name="category" readonly>
        <select name="visibility">
          <option value="rsu">rsu</option>
          <option value="members">members</option>
          <option value="public">public</option>
        </select>
        <textarea name="title" id="titleField" class="hidden" placeholder="Oggetto" style="min-height:120px;grid-column:1/-1;padding:12px;border:1px solid #cbd5e1;border-radius:6px;font:inherit;resize:vertical;"></textarea>
        <textarea name="body" id="bodyField" class="hidden" placeholder="Contenuto" style="min-height:320px;grid-column:1/-1;padding:12px;border:1px solid #cbd5e1;border-radius:6px;font:inherit;resize:vertical;"></textarea>
        <button id="saveButton" type="submit">Salva</button>
      </form>
      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="document-edit.js?v=20260627-2"></script>
  <script src="auth-menu.js?v=20260628-3"></script>
</body>
</html>
