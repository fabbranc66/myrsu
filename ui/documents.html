<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyRSU Documents Test</title>
  <link rel="stylesheet" href="menu.css">
  <link rel="stylesheet" href="users.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">MyRSU</p>
      <h1>Documenti</h1>
    </div>
    <nav class="app-nav">
      <a href="app/index.html">Dashboard</a>
      <div class="menu-group">
        <span>Anagrafica</span>
        <div class="submenu">
          <a href="users.html">Utenti</a>
          <a href="profile.html">Profilo</a>
        </div>
      </div>
      <div class="menu-group">
        <span>Protocollo</span>
        <div class="submenu">
          <a href="protocol.html">Registro</a>
        </div>
      </div>
      <div class="menu-group active">
        <span>Archivio</span>
        <div class="submenu">
          <a class="active" href="documents.html">Documenti</a>
          <a href="comunicati-create.html">Comunicati</a>
          <a href="pending-queue.html">Coda PDF</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="panel">
      <header>
        <h1>Archivio documenti</h1>
        <a class="button" href="comunicati-create.html">Nuovo comunicato</a>
      </header>

      <form id="uploadForm" class="grid hidden">
        <input name="file" type="file" required>
        <select name="category">
          <option value="documenti">documenti</option>
          <option value="comunicati">comunicati</option>
          <option value="segnalazioni">segnalazioni</option>
        </select>
        <select name="visibility">
          <option value="rsu">rsu</option>
          <option value="members">membri</option>
          <option value="public">pubblico</option>
        </select>
        <button type="submit">Carica</button>
      </form>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Visibilita</th>
            <th>Stato</th>
            <th>Dimensione</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody id="documentsTable"></tbody>
      </table>

      <dialog id="documentModal">
        <header>
          <h2>Documento</h2>
          <button id="closeDocumentModal" type="button">Chiudi</button>
        </header>
        <iframe id="documentPreview" title="Document preview"></iframe>
      </dialog>

      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="icons.js"></script>
  <script src="documents.js"></script>
</body>
</html>
