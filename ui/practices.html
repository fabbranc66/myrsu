<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyRSU Pratiche</title>
  <link rel="stylesheet" href="menu.css?v=20260627-1">
  <link rel="stylesheet" href="users.css?v=20260627-1">
  <link rel="stylesheet" href="practices.css?v=20260628-2">
</head>
<body>
  <header class="app-header"><div><p class="eyebrow">MyRSU</p><h1>Pratiche</h1></div><nav class="app-nav"></nav></header>
  <main>
    <section class="panel">
      <header><div><h1>Pratiche RSU</h1><p class="muted">Gestione, assegnazione e avanzamento.</p></div></header>
      <details class="practice-create-box">
        <summary>Nuova pratica</summary>
        <form id="practiceCreateForm" class="practice-form">
          <label class="wide">Titolo<input name="title" maxlength="255" required></label>
          <label class="wide">Sintesi<textarea name="summary" rows="4"></textarea></label>
          <label>Tipo<select name="type"></select></label>
          <label>Stato<select name="status"></select></label>
          <label>Priorità<select name="priority"></select></label>
          <label>Origine<select name="source_type"></select></label>
          <label>Assegnata a<select name="assigned_user_id"><option value="">-</option></select></label>
          <label>Visibilità<select name="visibility"></select></label>
          <label>Scadenza<input name="due_date" type="date"></label>
          <div class="wide"><button type="submit">Crea pratica</button></div>
        </form>
      </details>
      <table>
        <thead><tr><th>Tipo</th><th>Codice</th><th>Titolo</th><th>Avanzamento</th><th>Ultimo movimento</th><th>Priorità</th><th>Assegnata a</th><th></th></tr></thead>
        <tbody id="practicesTable"></tbody>
      </table>
      <pre id="message"></pre><pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="practice-options.js?v=20260628-1"></script>
  <script src="practices.js?v=20260628-2"></script>
  <script src="auth-menu.js?v=20260718-1"></script>
</body>
</html>
