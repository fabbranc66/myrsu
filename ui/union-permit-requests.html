<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Richieste permessi - MyRSU</title>
  <link rel="stylesheet" href="menu.css?v=20260719-mobile-menu-10">
  <link rel="stylesheet" href="users.css?v=20260719-mobile-11">
</head>
<body>
  <header class="app-header">
    <div><p class="eyebrow">MyRSU</p><h1>Richieste permessi</h1></div>
    <nav class="app-nav"></nav>
  </header>
  <main>
    <section class="panel">
      <header class="topbar"><div><p class="eyebrow">Delegati / RLS</p><h1>Emissione permesso sindacale</h1></div></header>
      <label>Delegato/RLS<select id="delegateSelect" name="user_id" form="requestForm" required></select></label>
      <div id="delegateInfo" class="stat-card"></div>
      <div id="balances" class="grid"></div>
      <form id="requestForm" class="grid">
        <input name="request_id" type="hidden">
        <label>Ambito permesso<select name="request_scope">
          <option value="internal">Interno - richiesta RSU</option>
          <option value="external">Esterno - richiesta sigla sindacale</option>
        </select></label>
        <label>Tipo richiesta<select name="permit_type">
          <option value="rsu">RSU - problematica sindacale</option>
          <option value="rls">RLS - problematica sicurezza</option>
        </select></label>
        <label>Sigla sindacale<input name="union_name" value="RSU" required></label>
        <label>Oggetto<textarea name="subject" required></textarea></label>
        <label>Data richiesta<input name="request_date" type="date" required></label>
        <label>Inizio<input name="start_at" type="datetime-local" required></label>
        <label>Fine<input name="end_at" type="datetime-local" required></label>
        <label>Ore richieste<input name="hours" type="number" min="0.5" step="0.5" required></label>
        <label>Note<textarea name="notes"></textarea></label>
        <button id="submitButton" type="submit">Genera PDF richiesta</button>
        <button id="resetFormButton" type="button">Nuova richiesta</button>
      </form>
      <table>
        <thead><tr><th>Protocollo</th><th>Data</th><th>Ambito</th><th>Tipo</th><th>Ore</th><th>Stato</th><th>Oggetto</th><th>Azioni</th></tr></thead>
        <tbody id="requestsTable"></tbody>
      </table>
      <dialog id="documentModal">
        <header>
          <h2>Richiesta permesso</h2>
          <button id="closeDocumentModal" type="button">Chiudi</button>
        </header>
        <iframe id="documentPreview" title="Anteprima richiesta permesso"></iframe>
      </dialog>
      <pre id="message"></pre>
      <pre id="jsonOutput" class="json-output"></pre>
    </section>
  </main>
  <script src="icons.js?v=20260719-icons-1"></script>
  <script src="union-permit-requests.js?v=20260721-mobile-pdf-1"></script>
  <script src="auth-menu.js?v=20260720-permits-2"></script>
</body>
</html>
